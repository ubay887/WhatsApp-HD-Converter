<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp HD Converter - Test Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-area:hover {
            background: #f8f9ff;
            border-color: #764ba2;
        }
        
        .upload-area.dragover {
            background: #f0f4ff;
            border-color: #764ba2;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        
        .status.show {
            display: block;
        }
        
        .status.info {
            background: #e3f2fd;
            color: #1565c0;
        }
        
        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .status.error {
            background: #ffebee;
            color: #c62828;
        }
        
        .progress {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
        }
        
        .progress.show {
            display: block;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .file-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
        }
        
        .file-info.show {
            display: block;
        }
        
        .file-info p {
            margin: 5px 0;
            color: #666;
            font-size: 14px;
        }
        
        .download-link {
            display: none;
            margin-top: 15px;
        }
        
        .download-link.show {
            display: block;
        }
        
        .download-link a {
            display: inline-block;
            background: #4caf50;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s;
        }
        
        .download-link a:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 WhatsApp HD Converter</h1>
        <p class="subtitle">Upload video untuk dioptimalkan untuk WhatsApp Status</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📹</div>
            <p><strong>Klik atau drag & drop video di sini</strong></p>
            <p style="font-size: 12px; color: #999; margin-top: 10px;">
                Format: MP4, MOV, AVI, MKV, WEBM, M4V<br>
                Maksimal: 100MB
            </p>
        </div>
        
        <input type="file" id="fileInput" accept="video/*">
        
        <div class="file-info" id="fileInfo">
            <p><strong>File dipilih:</strong></p>
            <p id="fileName"></p>
            <p id="fileSize"></p>
        </div>
        
        <button class="btn" id="convertBtn" disabled>Upload & Convert</button>
        
        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="status" id="status"></div>
        
        <div class="download-link" id="downloadLink">
            <a href="#" id="downloadBtn" download="converted.mp4">📥 Download Video HD</a>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const convertBtn = document.getElementById('convertBtn');
        const progress = document.getElementById('progress');
        const progressBar = document.getElementById('progressBar');
        const status = document.getElementById('status');
        const downloadLink = document.getElementById('downloadLink');
        const downloadBtn = document.getElementById('downloadBtn');
        
        let selectedFile = null;
        
        // Click to upload
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });
        
        // Drag & drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        
        function handleFile(file) {
            // Validate file type
            const validTypes = ['video/mp4', 'video/quicktime', 'video/x-msvideo', 'video/x-matroska', 'video/webm', 'video/x-m4v'];
            if (!validTypes.includes(file.type) && !file.name.match(/\.(mp4|mov|avi|mkv|webm|m4v)$/i)) {
                showStatus('Format file tidak didukung!', 'error');
                return;
            }
            
            // Validate file size (100MB)
            if (file.size > 100 * 1024 * 1024) {
                showStatus('File terlalu besar! Maksimal 100MB', 'error');
                return;
            }
            
            selectedFile = file;
            
            // Show file info
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            fileInfo.classList.add('show');
            
            // Enable convert button
            convertBtn.disabled = false;
            
            // Hide previous results
            downloadLink.classList.remove('show');
            status.classList.remove('show');
        }
        
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }
        
        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            // Disable button
            convertBtn.disabled = true;
            convertBtn.textContent = 'Converting...';
            
            // Show progress
            progress.classList.add('show');
            progressBar.style.width = '0%';
            
            // Hide previous results
            downloadLink.classList.remove('show');
            status.classList.remove('show');
            
            // Create form data
            const formData = new FormData();
            formData.append('video', selectedFile);
            
            try {
                showStatus('Uploading video...', 'info');
                progressBar.style.width = '30%';
                
                const response = await fetch('http://localhost:5000/convert', {
                    method: 'POST',
                    body: formData
                });
                
                progressBar.style.width = '70%';
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Conversion failed');
                }
                
                showStatus('Converting video...', 'info');
                progressBar.style.width = '90%';
                
                // Get the converted video as blob
                const blob = await response.blob();
                
                progressBar.style.width = '100%';
                
                // Create download link
                const url = URL.createObjectURL(blob);
                downloadBtn.href = url;
                downloadBtn.download = 'converted_' + selectedFile.name;
                
                // Show success
                showStatus('✅ Video berhasil dikonversi!', 'success');
                downloadLink.classList.add('show');
                
                // Hide progress after a moment
                setTimeout(() => {
                    progress.classList.remove('show');
                }, 1000);
                
            } catch (error) {
                showStatus('❌ Error: ' + error.message, 'error');
                progress.classList.remove('show');
            } finally {
                convertBtn.disabled = false;
                convertBtn.textContent = 'Upload & Convert';
            }
        });
        
        function showStatus(message, type) {
            status.textContent = message;
            status.className = 'status show ' + type;
        }
    </script>
</body>
</html>
